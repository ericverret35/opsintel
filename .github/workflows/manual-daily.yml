name: Manual or daily run

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # tous les jours à 06:00 UTC

# Garde ceci uniquement si tu modifies/push le repo dans ce workflow
permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
      # GITHUB_TOKEN existe déjà automatiquement ; expose-le en env seulement si tes scripts en ont besoin
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch jobs
        run: python fetch_jobs.py

      - name: Fetch pricing
        run: python fetch_pricing.py

      - name: Build search index
        run: python build_search_index.py

      # Si tu as un script de dashboard, décommente et mets le bon nom de fichier:
      # - name: Dashboard
      #   run: python dashboard.py

