name: Manual Daily (bootstrap)

sur :
workflow_dispatch :

permissions :
contenu : écriture

tâches :
bootstrap :
fonctionne sur : ubuntu-latest
env :
URL_BASE_DU_SITE : ${{ secrets.SITE_BASE_URL }}
JETON_GITHUB : ${{ secrets.GITHUB_TOKEN }}
étapes :
- utilise : actions/checkout@v4

texte

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install deps
    run: pip install -r requirements.txt

  - name: Fetch jobs
    run: python fetch_jobs.py

  - name: Fetch pricing
    run: python fetch_pricing.py

  - name: Build search index
    run: python build_search_index.py

  - name: Dashboard
    run: python build_dashboard.py

  - name: Commit content
    run: |
      if [ -n "$(git status --porcelain)" ]; then
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "chore: manual bootstrap $(date -u +'%Y-%m-%d %H:%M')"
        git push
      else
        echo "No changes"
      fi
