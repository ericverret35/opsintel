name: Build and deploy site
on:
workflow_dispatch:
schedule:
- cron: "0 6 * * *"
permissions:
contents: read
pages: write
id-token: write
concurrency:
group: "pages"
cancel-in-progress: true
jobs:
build:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: "3.11"
cache: "pip"
- name: Install Python deps
run: |
python -m pip install -U pip
pip install -r requirements.txt
- name: Fetch + build content (tolerant)
run: |
set -e
for s in fetch_arxiv.py fetch_bugbounty.py fetch_conferences.py fetch_ctf.py fetch_cves.py fetch_github_trending.py fetch_jobs.py fetch_k8s_releases.py fetch_osv.py fetch_outages.py fetch_podcasts.py fetch_pricing.py fetch_tech_news.py update_kev_flags.py; do
[ -f "$s" ] && (python "$s" || echo "warn: $s failed, continuing")
done
for s in build_advisories_weekly.py build_dashboard.py build_json_feeds.py build_search_index.py build_vendor_pages.py build_weekly_digests.py; do
[ -f "$s" ] && (python "$s" || echo "warn: $s failed, continuing")
done
- name: Configure Pages
id: pages
uses: actions/configure-pages@v5
- name: Build with Jekyll
uses: actions/jekyll-build-pages@v1
- name: Upload artifact
uses: actions/upload-pages-artifact@v3
with:
path: _site
deploy:
needs: build
environment:
name: github-pages
url: ${{ steps.deployment.outputs.page_url }}
runs-on: ubuntu-latest
steps:
- name: Deploy
id: deployment
uses: actions/deploy-pages@v4
