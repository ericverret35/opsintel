name: Update content (daily + manual)

on:
workflow_dispatch:
schedule:
- cron: "0 6 * * *"

permissions:
contents: write

jobs:
update:
runs-on: ubuntu-latest
steps:
- name: Checkout
uses: actions/checkout@v4
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"
      cache: "pip"

  - name: Install Python deps
    run: |
      python -m pip install --upgrade pip
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  - name: Fetch data
    shell: bash
    run: |
      set -Eeuo pipefail
      for s in \
        fetch_arxiv.py \
        fetch_bugbounty.py \
        fetch_conferences.py \
        fetch_ctf.py \
        fetch_cves.py \
        fetch_github_trending.py \
        fetch_jobs.py \
        fetch_k8s_releases.py \
        fetch_osv.py \
        fetch_outages.py \
        fetch_podcasts.py \
        fetch_pricing.py \
        fetch_tech_news.py \
        update_kev_flags.py
      do
        if [ -f "$s" ]; then python "$s" || echo "warn: $s failed"; fi
      done

  - name: Build content
    shell: bash
    run: |
      set -Eeuo pipefail
      for s in \
        build_advisories_weekly.py \
        build_dashboard.py \
        build_json_feeds.py \
        build_search_index.py \
        build_vendor_pages.py \
        build_weekly_digests.py
      do
        if [ -f "$s" ]; then python "$s" || echo "warn: $s failed"; fi
      done

  - name: Commit & push changes
    env:
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
    run: |
      git config user.name "$GIT_AUTHOR_NAME"
      git config user.email "$GIT_AUTHOR_EMAIL"
      git add -A
      git commit -m "ci: update content" || echo "no changes"
      git push
