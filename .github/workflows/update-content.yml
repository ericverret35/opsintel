name: Update content (daily + manual)
on:
workflow_dispatch:
schedule:
- cron: "0 6 * * *"
permissions:
contents: write
jobs:
update:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: "3.11"
cache: "pip"
- name: Install Python deps
run: |
python -m pip install -U pip
pip install -r requirements.txt
- name: Fetch data
shell: bash
run: |
set -Eeuo pipefail
for s in fetch_arxiv.py fetch_bugbounty.py fetch_conferences.py fetch_ctf.py fetch_cves.py fetch_github_trending.py fetch_jobs.py fetch_k8s_releases.py fetch_osv.py fetch_outages.py fetch_podcasts.py fetch_pricing.py fetch_tech_news.py update_kev_flags.py; do
if [ -f "$s" ]; then python "$s" || echo "warn: $s failed"; fi
done
- name: Build content
shell: bash
run: |
set -Eeuo pipefail
for s in build_advisories_weekly.py build_dashboard.py build_json_feeds.py build_search_index.py build_vendor_pages.py build_weekly_digests.py; do
if [ -f "$s" ]; then python "$s" || echo "warn: $s failed"; fi
done
- name: Commit & push changes
run: |
git config user.name "github-actions[bot]"
git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
git add -A
git commit -m "ci: update content" || echo "no changes"
git push
