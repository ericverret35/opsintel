name: Hourly Outages
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Outages
        run: python fetch_outages.py
      - name: Search index
        run: python build_search_index.py
      - name: JSON API
        run: python build_json_feeds.py
      - name: Dashboard
        run: python build_dashboard.py
      - name: Commit
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: outages sync $(date -u +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "No changes"
          fi
      - name: Alert outages
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: python post_alerts.py --outages 90
